[production]
phpSettings.display_startup_errors = 0
phpSettings.display_errors = 0
includePaths.library = APPLICATION_PATH "/../library"
bootstrap.path = APPLICATION_PATH "/Bootstrap.php"
bootstrap.class = "Bootstrap"
appnamespace = "Application"
resources.frontController.controllerDirectory = APPLICATION_PATH "/controllers"
resources.frontController.params.displayExceptions = 0

resources.frontController.moduleDirectory = APPLICATION_PATH "/modules"
resources.layout.layoutPath = APPLICATION_PATH "/layouts/default/scripts/"

;plugins
resources.frontController.plugins.ViewSetup = Elotech_Controller_Plugin_ViewSetup
resources.frontController.plugins.TempoLogout = Elotech_Controller_Plugin_MaisAcessados
autoloaderNamespaces.porto80 = "Elotech_"

;view helpers
resources.view.helperPath.Elotech_View_Helper = APPLICATION_PATH "/../library/Elotech/View/Helper"

; Configurações de acesso ao banco movido para o WebSocialResources
WSResources.dbConfig = APPLICATION_PATH "/../../../WebSocialComum/library/conf/dbConfig.xml"
date_default_timezone = "America/Sao_Paulo"

resources.locale.default = "pt_BR";
;retirado campos de conexão com db e colocado no teste, para fazer teste unitário.
;ignora o browser
resources.locale.force = true

logger.firebug = false
logger.db = false

; geração.versão.banco.biuld
versao = false
;versao.biuld = "1"
versaoZF = "1.11.11"

[staging : production]

[testing : production]
resources.db.adapter = "PDO_PGSQL"
resources.db.isDefaultTableAdapter = true
resources.db.params.host = localhost
resources.db.params.port = 5432
resources.db.params.username = postgres
resources.db.params.password = 123
resources.db.params.dbname = "mandaguari"
resources.db.params.charset = "UTF8"

phpSettings.error_reporting = "E_ALL & ~E_NOTICE"
phpSettings.display_startup_errors = 1
phpSettings.display_errors = 1
resources.frontController.params.displayExceptions = 1


[development : production]
phpSettings.error_reporting = "E_ALL & ~E_NOTICE"
phpSettings.display_startup_errors = 1
phpSettings.display_errors = 1
resources.frontController.params.displayExceptions = 1

logger.firebug = true
logger.db = false
